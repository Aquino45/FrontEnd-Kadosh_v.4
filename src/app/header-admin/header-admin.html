<header class="hdr">

  <a class="brand" routerLink="/home-admin/inicio" title="Ir al inicio">
    <img [src]="logoSrc" [alt]="logoAlt" title="Logo Kadosh" />
  </a>

  <div class="search-bar-container">
    <app-search-bar [placeholder]="'Buscar...'" (search)="onSearch($event)" (queryChange)="onQueryChange($event)">
    </app-search-bar>
  </div>

  <div class="actions">
    <button type="button" class="date-chip" (click)="openCalendar()" title="Seleccionar fecha">
      <i class="fa-solid fa-calendar-days chip-icon"></i>
      <div class="date-text">
        <span class="day">{{ today | date:'EEEE':'':'es-PE' }}</span>
        <span class="full-date">{{ today | date:'dd/MM/yyyy' }}</span>
      </div>
    </button>
    <input type="date" class="date-input-hidden" [value]="selectedDateISO" (change)="onDateChange($event)" title="Seleccionar fecha" placeholder="dd/mm/aaaa" />
  </div>

</header>
