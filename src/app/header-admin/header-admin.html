<header class="hdr">

  <a class="brand" routerLink="/home-admin/inicio" title="Ir al inicio">
    <img [src]="logoSrc" [alt]="logoAlt" title="Logo Kadosh" />
  </a>

  <div class="actions">

    <!-- Campana de notificaciones -->
    <button type="button" class="action-btn notif-btn" (click)="toggleNotifPanel()" title="Notificaciones">
      <i class="fa-solid fa-bell"></i>
      <span class="notif-badge" *ngIf="notifCount > 0">{{ notifCount }}</span>
    </button>

    <!-- Chip de perfil -->
    <div class="profile-chip">
      <div class="avatar">{{ userInitials }}</div>
      <div class="profile-text">
        <span class="profile-name">{{ userName }}</span>
        <span class="profile-rol">{{ userRol }}</span>
      </div>
    </div>

    <!-- Fecha -->
    <button type="button" class="date-chip" (click)="openCalendar()" title="Seleccionar fecha">
      <i class="fa-solid fa-calendar-days chip-icon"></i>
      <div class="date-text">
        <span class="day">{{ today | date:'EEEE':'':'es-PE' }}</span>
        <span class="full-date">{{ today | date:'dd/MM/yyyy' }}</span>
      </div>
    </button>
    <input type="date" class="date-input-hidden" [value]="selectedDateISO" (change)="onDateChange($event)" title="Seleccionar fecha" aria-label="Seleccionar fecha" />

  </div>

</header>
